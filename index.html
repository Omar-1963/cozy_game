<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Cozy Town</title>

<style>
body {
  margin:0;
  background:#1a1208;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

#game-wrap {
  position:relative;
  width:100%;
  max-width:800px;
  aspect-ratio: 800/560;
}

canvas {
  width:100%;
  height:100%;
  display:block;
  background:#b6d888;
}

#vibe {
  position:absolute;
  bottom:12px;
  left:12px;
  background:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

/* Mobile controls */
#mobile-controls {
  position:absolute;
  bottom:20px;
  right:20px;
  display:none;
}

#mobile-controls button {
  font-size:20px;
  padding:10px;
  margin:3px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.8);
}

@media (max-width: 900px) {
  #mobile-controls {
    display:block;
  }
}
</style>
</head>

<body>

<div id="game-wrap">
<canvas id="game"></canvas>
<div id="vibe">🌤 Calm Afternoon</div>

<div id="mobile-controls">
  <div>
    <button data-key="w">⬆️</button>
  </div>
  <div>
    <button data-key="a">⬅️</button>
    <button data-key="s">⬇️</button>
    <button data-key="d">➡️</button>
  </div>
  <button id="interact">E</button>
</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

const keys = {};

// keyboard
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// mobile
document.querySelectorAll("[data-key]").forEach(btn=>{
  btn.addEventListener("touchstart", ()=> keys[btn.dataset.key]=true);
  btn.addEventListener("touchend", ()=> keys[btn.dataset.key]=false);
});

document.getElementById("interact").addEventListener("touchstart", interact);

// player
const player = {x:200,y:200,s:3};

// npc
const npc = {x:300,y:200,dir:1};

// game zone
const gameZone = {x:100,y:100,w:150,h:100};

function interact(){
  alert("Here you can chill and ride your horse to explore & enjoy Witcher 3, or you can become an android in detroid world. the choice is yours!");
}

function update(){
  if(keys["w"]) player.y -= player.s;
  if(keys["s"]) player.y += player.s;
  if(keys["a"]) player.x -= player.s;
  if(keys["d"]) player.x += player.s;

  npc.x += npc.dir * 1;
  if(npc.x > 350 || npc.x < 250) npc.dir *= -1;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // game zone
  ctx.fillStyle="#5a6bd8";
  ctx.fillRect(gameZone.x,gameZone.y,gameZone.w,gameZone.h);
  ctx.fillStyle="#fff";
  ctx.fillText("GAME ZONE", gameZone.x+20, gameZone.y-10);

  // npc
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(npc.x,npc.y,15,0,Math.PI*2);
  ctx.fill();

  // player (blonde)
  ctx.fillStyle="#f4d03f";
  ctx.beginPath();
  ctx.arc(player.x,player.y,12,0,Math.PI*2);
  ctx.fill();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>

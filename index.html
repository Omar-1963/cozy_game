<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 Cozy Town</title>
<style>
  /* ─────────────────────────────────────────
     ROOT & RESET
  ───────────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --grass:   #b8d98d;
    --grass2:  #a8cc7c;
    --path:    #e8d8b8;
    --path2:   #ddc8a4;
    --sky:     #fef3e2;
    --warm:    #f5a623;
    --soft:    #f9c7a8;
    --muted:   #8c7b6e;
    --dialogue-bg: rgba(255,248,240,0.97);
    --dialogue-border: #e4b88a;
    --shadow: rgba(100,80,60,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #1a1208;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ─────────────────────────────────────────
     GAME CANVAS WRAPPER (Now Responsive)
  ───────────────────────────────────────── */
  #game-wrap {
    position: relative;
    width: 95vw;
    max-width: 800px;
    aspect-ratio: 800 / 560;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,0.55), 0 0 0 3px #c8a870;
    background: #b6d888;
  }

  #game-canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  /* ─────────────────────────────────────────
     MOBILE OVERLAYS
  ───────────────────────────────────────── */
  .mobile-ctrl {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: grid;
    grid-template-columns: repeat(3, 50px);
    grid-template-rows: repeat(2, 50px);
    gap: 8px;
    z-index: 25;
    pointer-events: none;
  }

  .mobile-btn {
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.2rem;
    pointer-events: auto;
    user-select: none;
  }
  
  .mobile-btn:active { background: rgba(255, 255, 255, 0.4); }

  #btn-interact {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 70px;
    height: 70px;
    background: rgba(245, 166, 35, 0.5);
    border: 3px solid white;
    border-radius: 50%;
    color: white;
    font-weight: 800;
    font-size: 1.5rem;
    z-index: 25;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (min-width: 1025px) {
    .mobile-ctrl, #btn-interact { display: none; }
  }

  /* ─────────────────────────────────────────
     INTRO OVERLAY
  ───────────────────────────────────────── */
  #intro {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #fdf0d5 0%, #fce4be 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 30;
    transition: opacity 0.7s ease;
    padding: 20px;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }

  #intro h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #7a5c38;
    text-align: center;
  }
  #intro p {
    font-size: 1rem;
    color: #9a7a58;
    text-align: center;
    max-width: 380px;
  }
  #intro button {
    background: linear-gradient(135deg, #f5a84a, #e8853a);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 13px 38px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ─────────────────────────────────────────
     DIALOGUE BOX
  ───────────────────────────────────────── */
  #dialogue {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 560px;
    background: var(--dialogue-bg);
    border: 2px solid var(--dialogue-border);
    border-radius: 16px;
    padding: 16px 24px;
    box-shadow: 0 6px 28px var(--shadow);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #dialogue.visible { opacity: 1; pointer-events: auto; }

  #prompt {
    position: absolute;
    background: rgba(255,248,235,0.92);
    border: 1.5px solid #deb87a;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.78rem;
    font-weight: 700;
    color: #7a5830;
    pointer-events: none;
    opacity: 0;
    z-index: 12;
    white-space: nowrap;
  }
  #prompt.visible { opacity: 1; }

  #vibe {
    position: absolute;
    bottom: 12px;
    left: 14px;
    background: rgba(255,248,235,0.88);
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: #9a7050;
    z-index: 11;
  }

  .petal {
    position: absolute;
    width: 7px; height: 7px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    pointer-events: none;
    animation: petalFall linear infinite;
    z-index: 10;
  }
  @keyframes petalFall {
    0%   { opacity:0; transform: translateY(-10px) rotate(0deg); }
    10%  { opacity:0.7; }
    90%  { opacity:0.4; }
    100% { opacity:0; transform: translateY(570px) rotate(360deg) translateX(40px); }
  }
</style>
</head>
<body>

<div id="game-wrap">
  <canvas id="game-canvas" width="800" height="560"></canvas>
  <div id="vibe">🌤 Calm Afternoon</div>
  <div id="prompt">Press E</div>

  <div class="mobile-ctrl">
    <div class="mobile-btn" style="grid-column: 2;" id="m-up">▲</div>
    <div class="mobile-btn" style="grid-column: 1; grid-row: 2;" id="m-left">◀</div>
    <div class="mobile-btn" style="grid-column: 2; grid-row: 2;" id="m-down">▼</div>
    <div class="mobile-btn" style="grid-column: 3; grid-row: 2;" id="m-right">▶</div>
  </div>
  <div id="btn-interact">E</div>

  <div id="dialogue">
    <div class="speaker" id="dialogue-speaker" style="font-weight:700; color:#c4854a; margin-bottom:5px;"></div>
    <div class="text" id="dialogue-text"></div>
    <div class="dismiss" style="font-size:0.75rem; color:#b89070; margin-top:8px; text-align:right;">Tap to close</div>
  </div>

  <div id="intro">
    <div style="font-size: 2.2rem; letter-spacing: 8px;">🌸 🏡 🍋</div>
    <h1>Cozy Town</h1>
    <p>A quiet little place where nothing urgent ever happens.</p>
    <button id="start-btn">Start Exploring →</button>
  </div>
</div>

<script>
const canvas  = document.getElementById('game-canvas');
const ctx     = canvas.getContext('2d');
const W = 800;
const H = 560;

// ─── MUSIC & PETALS (Original Logic) ──────────────────
let audioCtx;
function startAmbientMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 392.00, 329.63, 293.66];
    let t = audioCtx.currentTime + 0.3;
    const loopBars = () => {
      notes.forEach((freq, i) => {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t + i * 0.45);
        gain.gain.setValueAtTime(0, t + i * 0.45);
        gain.gain.linearRampToValueAtTime(0.055, t + i * 0.45 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.45 + 0.9);
        osc.start(t + i * 0.45); osc.stop(t + i * 0.45 + 1.0);
      });
      t += notes.length * 0.45 + 0.8;
      setTimeout(loopBars, (notes.length * 0.45 + 0.8) * 1000 - 300);
    };
    loopBars();
  } catch(e) {}
}

function playChime() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(660, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start(); osc.stop(audioCtx.currentTime + 0.45);
}

function spawnPetals() {
  const wrap = document.getElementById('game-wrap');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = (Math.random() * 800) + 'px';
    p.style.animationDuration = (6 + Math.random() * 8) + 's';
    p.style.animationDelay    = (Math.random() * 10) + 's';
    const hue = Math.random() > 0.5 ? '#f9c7d8' : '#fde8b4';
    p.style.background = hue;
    wrap.appendChild(p);
  }
}

// ─── GAME STATE & INPUT ─────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { 
  keys[e.key.toLowerCase()] = true; 
  if (e.key.toLowerCase() === 'e') handleInteract(); 
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile Input Binding
function bindMobile(id, key) {
  const el = document.getElementById(id);
  const start = (e) => { e.preventDefault(); keys[key] = true; };
  const end = (e) => { e.preventDefault(); keys[key] = false; };
  el.addEventListener('touchstart', start);
  el.addEventListener('touchend', end);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', end);
}
bindMobile('m-up', 'w'); bindMobile('m-down', 's');
bindMobile('m-left', 'a'); bindMobile('m-right', 'd');
document.getElementById('btn-interact').addEventListener('touchstart', (e) => { e.preventDefault(); handleInteract(); });
document.getElementById('btn-interact').addEventListener('click', handleInteract);

// ─── WORLD DATA (Original Buildings/Trees/NPCs) ─────
const objects = [
  { id: 'gaming', label: '🎮 Game Zone', x: 80, y: 80, w: 130, h: 110, interactRadius: 80, dialogue: { speaker: 'Game Zone', text: 'Here you can chill and ride your horse to explore & enjoy Witcher 3, or you can become an android in detroid world. the choice is yours!' }, color: '#e8b48a', roofColor: '#c4724a', accent: '#f0d0a8' },
  { id: 'lemonade', label: '🍋 Lemonade', x: 380, y: 50, w: 90, h: 65, interactRadius: 65, dialogue: { speaker: 'Lemonade Stand', text: 'Your favorite, a cold lemonade with some ice 🍋' }, color: '#f5e080', roofColor: '#d4a820', accent: '#fff8c0' },
  { id: 'cakeshop', label: '🍰 Cake Shop', x: 580, y: 70, w: 120, h: 100, interactRadius: 75, dialogue: { speaker: 'Sweet Bakery', text: 'Your favorite, a sweet piece of cake that makes everything better 🍰' }, color: '#f0b8c8', roofColor: '#d07898', accent: '#fde8f0' },
  { id: 'music', label: '🎶 Music Spot', x: 560, y: 380, w: 100, h: 70, interactRadius: 70, dialogue: { speaker: 'Music Corner', text: 'You sit down and play a soft melody 🎶' }, color: '#b8d8f0', roofColor: '#6898c0', accent: '#ddf0ff' },
];

const player = { x: 390, y: 300, speed: 2.2, dir: 'down', frame: 0, frameTimer: 0, moving: false };
const cat = { x: 260, y: 340, dir: 1, timer: 0, moveDur: 90, restDur: 120, resting: false, interactRadius: 55, tailWag: 0, dialogue: { speaker: '🐱 Cat', text: 'The cat looks at you, then walks away like it owns the place 🐱 ( it might be actually the real owner, no one knows )' } };
const npc = { x: 250, y: 165, speed: 0.3, dirX: 1, bobTimer: 0, interactRadius: 60, dialogue: { speaker: 'Townsfolk', text: "Hey… your accent is actually pretty good. Way better than Emily in Paris 😄" } };

const trees = [{x:50,y:260},{x:140,y:340},{x:50,y:420},{x:700,y:200},{x:720,y:310},{x:680,y:420},{x:200,y:470},{x:440,y:460},{x:320,y:50},{x:500,y:240},{x:130,y:240},{x:760,y:470}];
const flowers = [];
for(let i=0; i<28; i++) flowers.push({ x: 30+Math.random()*740, y: 30+Math.random()*500, col: ['#f9c7d8','#fde48a','#c8f0c0','#b8d8f0','#f0c8f8'][Math.floor(Math.random()*5)], r: Math.random()*Math.PI*2 });

// ─── RENDER HELPERS ─────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

function drawTree(x, y, idx) {
  const sway = Math.sin(globalTimer * 0.025 + idx * 1.3) * 1.2;
  ctx.fillStyle = 'rgba(60,80,30,0.13)';
  ctx.beginPath(); ctx.ellipse(x+9, y+52, 14, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#9a7040'; ctx.fillRect(x+5, y+38, 8, 16);
  const colors = ['#6aac40','#7cc048','#58941a'];
  [0,1,2].forEach((layer, l) => {
    ctx.save(); ctx.translate(x + 9 + sway * (l+1) * 0.3, 0); ctx.fillStyle = colors[l];
    ctx.beginPath(); ctx.arc(0, y + 28 - l * 10, 16 - l * 2, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function drawBuilding(obj) {
  const { x, y, w, h, color, roofColor, accent, label, id } = obj;
  ctx.fillStyle = 'rgba(80,50,20,0.12)';
  ctx.beginPath(); ctx.ellipse(x+w/2, y+h+8, w/2, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = color; roundRect(x, y, w, h, 8); ctx.fill();
  ctx.fillStyle = roofColor; ctx.beginPath(); ctx.moveTo(x-8, y+6); ctx.lineTo(x+w/2, y-h*0.35); ctx.lineTo(x+w+8, y+6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = accent; roundRect(x+w/2-w*0.11, y+h-h*0.38, w*0.22, h*0.38, 4); ctx.fill();
  ctx.fillStyle = 'rgba(80,50,20,0.75)'; ctx.font = 'bold 10px Nunito'; ctx.textAlign = 'center'; ctx.fillText(label, x+w/2, y-h*0.35-6);
}

function drawPlayer() {
  const bob = player.moving ? Math.sin(player.frame * 0.6) * 2 : Math.sin(globalTimer * 0.04) * 1;
  ctx.save(); ctx.translate(player.x, player.y + bob);
  ctx.fillStyle = 'rgba(50,30,10,0.15)'; ctx.beginPath(); ctx.ellipse(0, 28, 10, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#9cd8a8'; roundRect(-8, 7, 16, 18, 4); ctx.fill();
  ctx.fillStyle = '#f5d0a8'; ctx.beginPath(); ctx.arc(0, 2, 8.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f4d03f'; ctx.beginPath(); ctx.arc(0, -2, 8.5, Math.PI*1.05, Math.PI*2-0.05); ctx.fill();
  ctx.restore();
}

// ─── GAME LOOP ───────────────────────────────────────
let dialogueOpen = false;
let nearObject = null;
let globalTimer = 0;

function handleInteract() {
  if (dialogueOpen) { closeDialogue(); return; }
  if (!nearObject) return;
  openDialogue(nearObject.dialogue.speaker, nearObject.dialogue.text);
}

function openDialogue(speaker, text) {
  document.getElementById('dialogue-speaker').textContent = speaker;
  document.getElementById('dialogue-text').textContent = text;
  document.getElementById('dialogue').classList.add('visible');
  dialogueOpen = true; playChime();
}

function closeDialogue() {
  document.getElementById('dialogue').classList.remove('visible');
  dialogueOpen = false;
}

function update() {
  if (dialogueOpen) { player.moving = false; return; }
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  
  if (dx !== 0 || dy !== 0) {
    player.moving = true; player.frameTimer++;
    if(player.frameTimer > 4){ player.frame++; player.frameTimer=0; }
    const mag = Math.sqrt(dx*dx + dy*dy);
    player.x += (dx/mag) * player.speed;
    player.y += (dy/mag) * player.speed;
  } else { player.moving = false; }

  // Cat/NPC movement
  npc.x += npc.dirX * npc.speed; if (npc.x > 320 || npc.x < 200) npc.dirX *= -1;
  
  // Interaction check
  nearObject = null;
  const dist = (x1,y1,x2,y2) => Math.hypot(x1-x2, y1-y2);
  objects.forEach(o => { if(dist(player.x, player.y, o.x+o.w/2, o.y+o.h/2) < o.interactRadius) nearObject = o; });
  if(dist(player.x, player.y, cat.x+10, cat.y+8) < cat.interactRadius) nearObject = cat;
  if(dist(player.x, player.y, npc.x, npc.y) < npc.interactRadius) nearObject = npc;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#b6d888'; ctx.fillRect(0,0,W,H);
  
  flowers.forEach((f, i) => {
    const wobble = Math.sin(globalTimer * 0.04 + i) * 1.5;
    ctx.fillStyle = f.col; ctx.beginPath(); ctx.arc(f.x, f.y+wobble, 3, 0, Math.PI*2); ctx.fill();
  });

  trees.forEach((t, i) => drawTree(t.x, t.y, i));
  objects.forEach(o => drawBuilding(o));
  
  // NPC
  ctx.fillStyle = '#a8c8f0'; roundRect(npc.x-8, npc.y+8+Math.sin(globalTimer*0.05)*1.5, 16, 18, 4); ctx.fill();
  
  drawPlayer();

  // Prompt logic
  const p = document.getElementById('prompt');
  if(nearObject && !dialogueOpen) {
    const rect = canvas.getBoundingClientRect();
    const scale = rect.width / W;
    const ox = (nearObject.w ? nearObject.x + nearObject.w/2 : nearObject.x);
    p.style.left = (ox * scale - 20) + "px";
    p.style.top = ((nearObject.y || npc.y) * scale - 40) + "px";
    p.classList.add('visible');
  } else { p.classList.remove('visible'); }

  globalTimer++;
}

function startGame() {
  document.getElementById('intro').classList.add('hidden');
  spawnPetals(); startAmbientMusic();
  const loop = () => { update(); render(); requestAnimationFrame(loop); };
  loop();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('dialogue').addEventListener('click', closeDialogue);
</script>
</body>
</html>
